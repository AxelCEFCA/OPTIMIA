# services.yaml  -  the machine-readable service registry (skills & MCP).
#
# The index an agent loads to discover what it can call. One entry per service; the full
# detail lives in the matching "<id>.md" card. Ships EMPTY (the two example_* entries below
# are illustrative placeholders - delete them and register the real services on configuration,
# CONFIG_QUESTIONS.md block E). Secrets are NEVER stored here; declare only which auth is needed.

version: 1
services: []        # fill with entries shaped like the commented examples below

